name: Temporary Whisper Build

on:
  push:
    paths:
      - '.github/workflows/temp-whisper-build.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build whisper.cpp
        run: |
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF
          cmake --build whisper.cpp/build --config Release -j2
          mkdir -p bundle
          cp whisper.cpp/build/bin/whisper-cli bundle/
      - name: Download multilingual model
        run: |
          curl -L --retry 5 --fail -o bundle/ggml-base-q5_1.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin
          chmod +x bundle/whisper-cli
          ls -lh bundle
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: whisper-local-bundle
          path: bundle/
          retention-days: 1
